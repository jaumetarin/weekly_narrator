name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install backend dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run backend tests
        run: npm test -- --runInBand
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/weekly_narrator
          JWT_SECRET: test-jwt-secret
          GITHUB_CLIENT_ID: test-client-id
          GITHUB_CLIENT_SECRET: test-client-secret
          GITHUB_CALLBACK_URL: http://localhost:3000/auth/github/callback
          FRONTEND_URL: http://localhost:4200
          CRON_API_KEY: test-cron-key
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/weekly_narrator

      - name: Build backend
        run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/weekly_narrator
          JWT_SECRET: test-jwt-secret
          GITHUB_CLIENT_ID: test-client-id
          GITHUB_CLIENT_SECRET: test-client-secret
          GITHUB_CALLBACK_URL: http://localhost:3000/auth/github/callback
          FRONTEND_URL: http://localhost:4200
          CRON_API_KEY: test-cron-key
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/weekly_narrator

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: changelog-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: changelog-frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build -- --configuration=production
